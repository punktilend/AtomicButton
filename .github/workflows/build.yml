name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Windows (MSVC + WASAPI) ─────────────────────────────
  build-windows:
    name: Windows (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: >
          cmake -B build
          -G "Visual Studio 17 2022" -A x64
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: ShortcutPro-Windows
          path: build/AtomicButton_artefacts/Release/
          if-no-files-found: warn

  # ── macOS (Clang + CoreAudio) ───────────────────────────
  build-macos:
    name: macOS (Clang)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: >
          cmake -B build
          -G Xcode
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: ShortcutPro-macOS
          path: build/AtomicButton_artefacts/Release/
          if-no-files-found: warn

  # ── Linux (GCC + ALSA) ─────────────────────────────────
  build-linux:
    name: Linux (GCC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install JUCE system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libasound2-dev \
            libfreetype-dev \
            libcurl4-openssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            mesa-common-dev \
            libjack-jackd2-dev \
            ladspa-sdk

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: ShortcutPro-Linux
          path: build/AtomicButton_artefacts/Release/
          if-no-files-found: warn
